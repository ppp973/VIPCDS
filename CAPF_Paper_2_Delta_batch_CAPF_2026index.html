<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Class Player — Ultra Phase 3 Applied</title>

    <!-- Fonts & icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
    /* ---------------- Root theme (kept compatible with your dark-mode) ---------------- */
    :root{
      --bg-base: #071017;
      --bg-color: #f5f5f7;
      --text-color: #1d1d1f;
      --card-bg: rgba(255,255,255,0.06);
      --active-color: #00c8ff;
      --border-color: rgba(255,255,255,0.06);
      --hover-bg: rgba(255,255,255,0.08);
      --glass-blur: blur(14px);
      --radius: 12px;
    }

    body.dark-mode {
      --bg-color: #000000;
      --text-color: #f5f5f7;
      --card-bg: rgba(255,255,255,0.03);
      --active-color: #0a84ff;
      --border-color: rgba(255,255,255,0.03);
      --hover-bg: rgba(255,255,255,0.04);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: radial-gradient(circle at 20% 10%, rgba(0,200,255,0.04), transparent 8%),
                  radial-gradient(circle at 80% 80%, rgba(155,107,255,0.03), transparent 8%),
                  linear-gradient(180deg,#05070a,#071017 60%);
      color: #e8f6ff;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      perspective:1200px;
      position:relative;
    }

    /* Floating decorative blobs (parallax feel) */
    body::before, body::after{
      content:"";
      position:absolute;
      width:580px; height:580px; border-radius:50%;
      filter:blur(120px); opacity:0.95; mix-blend-mode:screen; z-index:-2;
    }
    body::before{ left:-220px; top:-160px; background:linear-gradient(135deg,#00c8ff,#0066ff); animation:moveA 24s ease-in-out infinite alternate; }
    body::after{ right:-220px; bottom:-160px; background:linear-gradient(135deg,#9b6bff,#00c8ff); animation:moveB 20s ease-in-out infinite alternate; }
    @keyframes moveA{ from{transform:translate3d(0,0,0)} to{transform:translate3d(200px,-120px,40px)} }
    @keyframes moveB{ from{transform:translate3d(0,0,0)} to{transform:translate3d(-160px,120px,-40px)} }

    /* ---------- HEADER ---------- */
    header{
      padding:15px 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      height:64px; display:flex; align-items:center; gap:12px;
      z-index:5;
    }
    .back-btn{ color:var(--active-color); text-decoration:none; font-weight:700; display:flex; align-items:center; gap:8px }
    .header-title{ font-weight:700; font-size:1rem; color:var(--text-color); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60% }
    #themeToggle{ cursor:pointer; font-size:1.1rem; color:var(--text-color) }

    /* ---------- MAIN LAYOUT ---------- */
    .main-container{
      display:flex; flex:1; overflow:hidden; gap:18px; padding:20px;
      /* default to 'compact' feel vertically stacked on narrow screens */
      flex-direction:column;
    }

    /* ---------- VIDEO SECTION (glass + neon border) ---------- */
    .video-section{
      position:relative; width:100%; background:#000; border-radius:var(--radius);
      box-shadow: 0 20px 60px rgba(2,10,30,0.7);
      overflow:hidden; flex-shrink:0;
      transform-style:preserve-3d;
    }

    /* Neon animated border using pseudo-element */
    .video-section::after{
      content:""; position:absolute; inset:6px; border-radius:10px; pointer-events:none;
      background: linear-gradient(120deg, rgba(0,200,255,0.2), rgba(0,120,255,0.08));
      box-shadow: 0 0 40px rgba(0,200,255,0.06);
      mix-blend-mode:screen; z-index:3; transition:opacity .3s ease;
    }

    /* Aspect ratio container */
    .video-wrapper{ position:relative; width:100%; padding-top:56.25%; }
    iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; display:block; border-radius:6px }

    /* dynamic canvas overlay (visual only) */
    .video-stage-canvas{ position:absolute; inset:0; pointer-events:none; z-index:2; mix-blend-mode:screen; opacity:0.6; }

    /* ---------- PLAYLIST ---------- */
    .playlist-section{
      flex:1; overflow-y:auto; padding:12px; background:transparent;
      -webkit-overflow-scrolling:touch;
    }
    .playlist-header{ padding:10px 5px; font-size:0.9rem; color:#bfcbd6; text-transform:uppercase; letter-spacing:0.6px; font-weight:700 }

    .class-item{
      display:flex; align-items:center; gap:12px; padding:14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px; margin-bottom:12px; cursor:pointer; transition: transform .28s cubic-bezier(.2,.9,.2,1), box-shadow .28s, background .28s;
      border:1px solid rgba(255,255,255,0.02);
      transform-style:preserve-3d;
    }
    .class-item:hover{ transform: translateY(-8px) rotateX(2deg) translateZ(6px); box-shadow: 0 18px 40px rgba(2,10,30,0.6) }
    .class-item.active{ border-color:var(--active-color); background: linear-gradient(180deg, rgba(0,200,255,0.06), rgba(255,255,255,0.01)); box-shadow:0 20px 50px rgba(0,200,255,0.08) }

    .play-icon{ width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.03); color:var(--active-color); flex-shrink:0; font-size:0.9rem; transition:all .2s ease }
    .class-item.active .play-icon{ background:var(--active-color); color:#fff }

    .class-info h4{ font-size:0.95rem; font-weight:600; color:var(--text-color); margin-bottom:4px; }
    .class-info span{ font-size:0.78rem; color:#bfcbd6 }

    /* Small responsive niceties */
    @media (min-width:900px){
      .main-container{ flex-direction:row }
      .video-section{ width:70%; height:calc(100vh - 124px) } /* header + paddings considered */
      .video-wrapper{ padding-top:0; height:100% }
      .playlist-section{ width:30%; height:calc(100vh - 124px); border-left: 1px solid rgba(255,255,255,0.02); padding:20px }
    }

    /* Error state */
    .error-msg{ padding:40px; text-align:center; color:var(--text-color) }

    /* subtle entrance for playlist items */
    .class-item{ opacity:0; transform: translateY(12px) scale(0.995); animation:enter .45s forwards ease; animation-delay: calc(var(--i) * 0.06s) }
    @keyframes enter{ to{ opacity:1; transform: translateY(0) scale(1) } }

    /* tiny note styling */
    .notice{ padding:10px 12px; background:rgba(0,0,0,0.25); border-radius:10px; color:#cfeeff; margin:12px 20px }

    </style>
</head>
<body>
    <header>
        <a href="javascript:history.back()" class="back-btn">
            <i class="fas fa-chevron-left"></i> Back
        </a>
        <div class="header-title" id="pageTitle">Loading Class...</div>
        <div id="themeToggle" style="cursor:pointer;font-size:1.1rem;">
            <i class="fas fa-moon"></i>
        </div>
    </header>

    <div class="main-container">
        <!-- 1. PLAYER (IFRAME) -->
        <div class="video-section" aria-hidden="false">
            <div class="video-wrapper">
                <!-- visual overlay canvas (purely decorative; doesn't change your JS) -->
                <canvas class="video-stage-canvas" id="decorCanvas" aria-hidden="true"></canvas>

                <iframe 
                    id="mainPlayer" 
                    src="" 
                    allow="autoplay; fullscreen; clipboard-write" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <!-- 2. LIST (PLAYLIST) -->
        <div class="playlist-section">
            <div class="playlist-header" id="subjectName">Course Content</div>
            <div id="playlistContainer">
                <!-- JavaScript will load items here -->
            </div>
        </div>
    </div>

    <!-- Load your Data File -->
    <script src="data.js"></script>

    <!-- YOUR ORIGINAL JS (no changes) -->
    <script>
        // --- 1. THEME LOGIC (Same as your index.html) ---
        const themeToggle = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark' || (!currentTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        // --- 2. PLAYER LOGIC ---
        const player = document.getElementById('mainPlayer');
        const playlistContainer = document.getElementById('playlistContainer');
        const pageTitle = document.getElementById('pageTitle');
        const subjectLabel = document.getElementById('subjectName');

        // URL se Batch ID aur Subject ID nikalna
        const urlParams = new URLSearchParams(window.location.search);
        const batchId = urlParams.get('batch');
        const subjectId = urlParams.get('subject');

        function initPlayer() {
            // Data check
            if (!batchData || !batchData[batchId]) {
                playlistContainer.innerHTML = `<div class="error-msg">Batch not found.</div>`;
                return;
            }

            const batch = batchData[batchId];
            // Find specific subject from the array
            const subject = batch.subjects.find(s => s.id === subjectId);

            if (!subject) {
                playlistContainer.innerHTML = `<div class="error-msg">Subject not found.</div>`;
                return;
            }

            // UI Update
            pageTitle.textContent = subject.name;
            subjectLabel.textContent = `${batch.batchName} • ${subject.classes.length} Classes`;

            if (subject.classes.length === 0) {
                playlistContainer.innerHTML = `<div class="error-msg">No classes uploaded yet.</div>`;
                return;
            }

            // Populate Playlist
            subject.classes.forEach((cls, index) => {
                const div = document.createElement('div');
                div.className = 'class-item';
                // for entrance animation delay variable
                div.style.setProperty('--i', index);

                // First video auto-load
                if (index === 0) {
                    playVideo(cls.link, div);
                }

                div.onclick = () => playVideo(cls.link, div);

                div.innerHTML = `
                    <div class="play-icon">
                        <i class="fas fa-play"></i>
                    </div>
                    <div class="class-info">
                        <h4>${cls.name}</h4>
                        <span>Class ${index + 1}</span>
                    </div>
                `;
                playlistContainer.appendChild(div);
            });
        }

        // Function to play video inside IFRAME
        function playVideo(link, element) {
            // Update Iframe Source
            player.src = link;

            // Highlight active item
            document.querySelectorAll('.class-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.class-item .play-icon i').forEach(icon => icon.className = 'fas fa-play');
            
            if (element) {
                element.classList.add('active');
                // Icon change to pause/playing indicator
                const icon = element.querySelector('.play-icon i');
                if(icon) icon.className = 'fas fa-chart-bar'; // Equalizer icon
            }
        }

        // Start
        initPlayer();

    </script>

    <!-- Decorative small script for subtle canvas motion (purely visual; doesn't change player logic) -->
    <script>
      (function(){
        try{
          const canvas = document.getElementById('decorCanvas');
          const ctx = canvas.getContext && canvas.getContext('2d');
          if(!ctx) return;
          function resize(){
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
          }
          resize();
          window.addEventListener('resize', resize);
          let t = 0;
          function draw(){
            t += 0.01;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // subtle moving radial glow top-right
            const grd = ctx.createRadialGradient(canvas.width*0.85, canvas.height*0.15, 10, canvas.width*0.85, canvas.height*0.15, Math.max(canvas.width,canvas.height)*0.9);
            const a = (Math.sin(t)+1)/6 + 0.15;
            grd.addColorStop(0, `rgba(0,200,255,${a})`);
            grd.addColorStop(0.5, `rgba(155,107,255,${a*0.45})`);
            grd.addColorStop(1, `rgba(0,0,0,0)`);
            ctx.fillStyle = grd;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            requestAnimationFrame(draw);
          }
          draw();
        }catch(e){}
      })();
    </script>

</body>
