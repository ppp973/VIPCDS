<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bravo MATH Batch - Subjects</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon_io/favicon-16x16.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../mobile-fix.css">
    <style>
        /* All original styles are copied here */
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=SF+Pro+Text:wght@400;500;600&display=swap');
        :root {
            --blue: #007aff; --indigo: #5856d6; --purple: #af52de; --pink: #ff2d55; --red: #ff3b30; --orange: #ff9500; --yellow: #ffcc00; --green: #34c759; --teal: #5ac8fa; --cyan: #32ade6; --telegram-blue: #2AABEE;
            --primary-color: var(--blue); --secondary-color: var(--indigo); --light-gray: #f5f5f7; --medium-gray: #e8e8ed; --dark-gray: #86868b; --text-color: #1d1d1f;
            --background: #f8f9fa; --card-background: #ffffff; --elevated-background: #ffffff; --subtle-overlay: rgba(209, 209, 214, 0.4);
            --dark-background: #121212; --dark-card-background: #1e1e1e; --dark-text-color: #f5f5f7; --dark-secondary-text: #b0b0b5; --dark-border-color: #2a2a2a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background-color: var(--background); color: var(--text-color); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; padding: 40px 20px; transition: background-color 0.3s ease, color 0.3s ease; }
        body.dark-mode { background-color: var(--dark-background); color: var(--dark-text-color); }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; position: relative; }
        .theme-toggle { position: relative; right: 0; top: 0; background-color: var(--subtle-overlay); border: none; font-size: 1.4rem; color: var(--dark-gray); cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .theme-toggle:hover { background-color: var(--medium-gray); transform: rotate(10deg); }
        .dark-mode .theme-toggle { background-color: #2a2a2a; color: var(--yellow); }
        .dark-mode .theme-toggle:hover { background-color: #3a3a3a; }
        .main-title { display: flex; flex-direction: row; align-items: center; gap: 20px; margin-bottom: 0; }
        .page-title { font-size: 2.2rem; font-weight: 800; color: var(--text-color); letter-spacing: 0.02em; position: relative; }
        .dark-mode .page-title { color: var(--dark-text-color); }
        .footer { text-align: center; margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--medium-gray); color: var(--dark-gray); font-size: 0.9rem; }
        .dark-mode .footer { border-top-color: var(--dark-border-color); color: var(--dark-secondary-text); }
        .back-link {
            font-family: 'SF Pro Text', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dark-mode .back-link { color: var(--teal); }
        .back-link:hover { color: var(--indigo); }
        .back-link i { transition: transform 0.3s ease; }
        .back-link:hover i { transform: translateX(-4px); }
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }
        .subject-card {
            background-color: var(--card-background); border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 20px; text-decoration: none;
            color: inherit; border: 1px solid var(--medium-gray); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            opacity: 0; transform: translateY(30px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out, box-shadow 0.3s ease, transform 0.3s ease, border-color 0.3s ease;
        }
        .subject-card.is-visible { opacity: 1; transform: translateY(0); }
        .dark-mode .subject-card { background-color: var(--dark-card-background); border-color: var(--dark-border-color); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); }
        .subject-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08); }
        .dark-mode .subject-card:hover { box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3); }
        .subject-icon { font-size: 2rem; width: 45px; text-align: center; }
        .subject-content { flex-grow: 1; }
        .subject-name { font-family: 'SF Pro Display', sans-serif; font-size: 1.2rem; font-weight: 600; margin-bottom: 5px; }
        .subject-action { font-size: 0.9rem; font-weight: 500; color: var(--dark-gray); transition: color 0.3s ease; }
        .dark-mode .subject-action { color: var(--dark-secondary-text); }
        .subject-action i { margin-left: 4px; transition: transform 0.3s ease; }
        .subject-card:hover .subject-action i { transform: translateX(5px); }
        
        .placeholder-content {
            text-align: center; padding: 80px 40px; background-color: var(--card-background);
            border-radius: 20px; border: 1px solid var(--medium-gray); margin-top: 30px; grid-column: 1 / -1;
        }
        .dark-mode .placeholder-content { background-color: var(--dark-card-background); border-color: var(--dark-border-color); }
        .placeholder-content i { font-size: 3rem; margin-bottom: 20px; }
        .placeholder-content h2 { font-family: 'SF Pro Display', sans-serif; font-size: 1.8rem; margin-bottom: 10px; }
        .placeholder-content p { font-size: 1.1rem; color: var(--dark-gray); }
        .dark-mode .placeholder-content p { color: var(--dark-secondary-text); }

        .theme-cds-ota .subject-icon, .theme-cds-ota .placeholder-content i { color: var(--blue); }
        .theme-cds-ota .subject-card:hover { border-color: var(--blue); }
        .theme-cds-ota .subject-card:hover .subject-action { color: var(--blue); }
        
        .theme-cds-math .subject-icon, .theme-cds-math .placeholder-content i { color: var(--purple); }
        .theme-cds-math .subject-card:hover { border-color: var(--purple); }
        .theme-cds-math .subject-card:hover .subject-action { color: var(--purple); }

        .theme-nda .subject-icon, .theme-nda .placeholder-content i { color: var(--orange); }
        .theme-nda .subject-card:hover { border-color: var(--orange); }
        .theme-nda .subject-card:hover .subject-action { color: var(--orange); }

        .theme-afcat .subject-icon, .theme-afcat .placeholder-content i { color: var(--green); }
        .theme-afcat .subject-card:hover { border-color: var(--green); }
        .theme-afcat .subject-card:hover .subject-action { color: var(--green); }

        .theme-capf .subject-icon, .theme-capf .placeholder-content i { color: var(--red); }
        .theme-capf .subject-card:hover { border-color: var(--red); }
        .theme-capf .subject-card:hover .subject-action { color: var(--red); }

        @media (max-width: 768px) { .main-title { flex-direction: column; align-items: flex-start; gap: 15px; } .page-title { font-size: 2rem; } header { margin-bottom: 40px; } }
        @media (max-width: 480px) { body { padding: 20px 15px 40px; } .subject-grid { grid-template-columns: 1fr; gap: 20px; } .page-title { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="main-title">
                <a href="../new.html" class="back-link"><i class="fas fa-arrow-left"></i> All Batches</a>
                <span class="page-title" id="pageTitle">Loading Batch...</span>
            </h1>
            <button id="themeToggle" class="theme-toggle" type="button">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <div class="subject-grid" id="subjectGridContainer">
            </div>

        <div class="footer">
            VIPSTUDY △ © 2025 - All Rights Reserved
        </div>
    </div>

    <script src="../data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Dark mode toggle ---
            const themeToggle = document.getElementById('themeToggle');
            const currentTheme = localStorage.getItem('theme');
            if (currentTheme === 'dark' || (!currentTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                let theme = 'light';
                let icon = '<i class="fas fa-moon"></i>';
                if (document.body.classList.contains('dark-mode')) {
                    theme = 'dark';
                    icon = '<i class="fas fa-sun"></i>';
                }
                localStorage.setItem('theme', theme);
                themeToggle.innerHTML = icon;
            });

            // --- Dynamic Subject Loader ---
            const batchId = "BRAVO_MATH_BATCH_NDA-1_2026";
            
            const subjectGrid = document.getElementById('subjectGridContainer');
            const pageTitle = document.getElementById('pageTitle');
            const batch = batchData[batchId];

            if (batch) {
                pageTitle.textContent = batch.batchName;
                document.title = `${batch.batchName} - Subjects`;
                const themeClass = `theme-${batch.theme}`;
                subjectGrid.classList.add(themeClass);

                if (batch.subjects && batch.subjects.length > 0) {
                    batch.subjects.forEach((subject, index) => {
                        const subjectCard = document.createElement('a');
                        subjectCard.href = `../classes.html?batch=${batchId}&subject=${subject.id}`;
                        subjectCard.className = "subject-card";
                        subjectCard.style.transitionDelay = `${index * 50}ms`; // Animation
                        subjectCard.innerHTML = `
                            <div class="subject-icon"><i class="${subject.icon}"></i></div>
                            <div class="subject-content">
                                <h3 class="subject-name">${subject.name}</h3>
                                <span class="subject-action">View Classes <i class="fas fa-arrow-right"></i></span>
                            </div>
                        `;
                        subjectGrid.appendChild(subjectCard);
                    });
                } else {
                    subjectGrid.innerHTML = `
                        <div class="placeholder-content ${themeClass}">
                            <i class="fas fa-hourglass-half"></i>
                            <h2>Subjects Coming Soon</h2>
                            <p>The subject list for this batch will be updated shortly.</p>
                        </div>
                    `;
                }
            } else {
                pageTitle.textContent = "Error";
                subjectGrid.innerHTML = "<p>Batch data not found. Check 'data.js'.</p>";
            }
            
            const animatedElements = document.querySelectorAll('.subject-card, .placeholder-content');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            animatedElements.forEach(el => { observer.observe(el); });
        });
    </script>
</body>
</html>
